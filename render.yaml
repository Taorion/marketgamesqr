services:
  - type: web
    name: market-games-portal
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_SSL
        value: "true"
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: ENABLE_DEMO_TOOLS
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        sync: false
      - key: PUBLIC_VALIDATOR_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_URL
        sync: false
